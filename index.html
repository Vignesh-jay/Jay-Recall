<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Recall | Search Your Knowledge</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="logo-section">
                <h1>🧠 Jay Recall</h1>
                <p>Never Google The Same Thing Twice</p>
            </div>

            <nav>

                <div class="nav-item active"
                    onclick="loadDashboard()">

                    🏠 Dashboard

                </div>

                <div class="nav-item"
                    onclick="loadSearch()">

                    🔍 Recall Search

                </div>

                <div class="nav-item"
                    onclick="loadAddEntry()">

                    📥 Capture Knowledge

                </div>

                <div class="nav-item"
                    onclick="loadKnowledgeBase()">

                    🗄 Recall Vault

                </div>

                <div class="nav-item"
                    onclick="loadFavorites()">

                    ⭐ Favorites

                </div>

                <div class="nav-item"
                    onclick="loadSettings()">

                    ⚙ Settings

                </div>

            </nav>

            <div class="sidebar-footer">

                Go get a memory loss. I'm here. <br><br>
                Jay Recall v1.0

            </div>

        </aside>

        <!-- Main Content -->

        <main class="content">
            <div class="mobile-header">

                <span class="mobile-logo">
                    🧠
                </span>

                <div>

                    <div class="mobile-title">

                        Jay Recall

                    </div>
                    <div class="mobile-subtitle">

                        Never Google The Same Thing Twice

                    </div>

                </div>

            </div>
            <div class="quick-search">

                <div class="global-search-wrapper">

                    <input
                        id="globalSearch"
                        type="text"
                        placeholder="Search commands, notes, fixes..."
                    >

                    <div id="quickSearchResults">

                    </div>

                </div>

            </div>

            <div id="content">

            </div>

        </main>
        <div class="mobile-nav">

            <button
                onclick="loadDashboard()">

                <span>🏠</span><br>
                <small>Home</small>

            </button>

            <button
                onclick="loadAddEntry()">

                <span>➕</span><br>
                <small>Add</small>
            </button>
            
            <button
                onclick="loadSearch()">

                <span>🔍</span><br>
                <small>Search</small>
            </button>

            <button
                onclick="loadSettings()">

                <span>⚙</span><br>
                <small>Settings</small>
            </button>

        </div>

    </div>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/starter-data.js"></script>

</body>

</html>
